<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Korichi — Portfolio BTS SIO SISR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Tokens ─────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cyan:   #00ffff;
  --magenta:#ff00ff;
  --blue:   #0080ff;
  --bg:     #080c18;
  --bg2:    #0d1120;
  --surface: rgba(255,255,255,0.04);
  --border:  rgba(0,255,255,0.18);
  --text:   #dde6f0;
  --muted:  rgba(255,255,255,0.45);
  --font-display: 'Syne', sans-serif;
  --font-mono:    'Space Mono', monospace;
  --radius: 12px;
  --transition: 0.28s cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Ambient background gradients */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 90%, rgba(0,255,255,.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 10%, rgba(255,0,255,.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(0,128,255,.04) 0%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}

/* ─── Layout ──────────────────────────────────────────────────── */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  position: relative;
  z-index: 1;
}

/* ─── Header ──────────────────────────────────────────────────── */
.header {
  text-align: center;
  padding: 64px 0 48px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 280px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
  animation: linePulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse { from { opacity:.4; width:180px } to { opacity:1; width:320px } }

.header h1 {
  font-size: clamp(2.2rem, 5vw, 3.6rem);
  font-weight: 800;
  letter-spacing: -.02em;
  background: linear-gradient(135deg, var(--cyan) 0%, var(--magenta) 50%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.header p {
  font-family: var(--font-mono);
  font-size: .95rem;
  color: var(--muted);
  letter-spacing: .08em;
}

/* ─── Tabs ────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}

.tab-btn {
  font-family: var(--font-display);
  font-size: .85rem;
  font-weight: 600;
  letter-spacing: .02em;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.tab-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,255,255,.12), rgba(255,0,255,.08));
  opacity: 0;
  transition: opacity var(--transition);
}

.tab-btn:hover,
.tab-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,255,255,.15);
}

.tab-btn:hover::after,
.tab-btn.active::after { opacity: 1; }

/* ─── Content Panel ───────────────────────────────────────────── */
.content {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  padding: 36px;
  box-shadow: 0 24px 48px rgba(0,0,0,.35);
  position: relative;
  overflow: hidden;
}

.content::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
  opacity: .5;
}

/* ─── Section Animation ───────────────────────────────────────── */
.section { display: none; }
.section.active {
  display: block;
  animation: fadeUp .4s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Section headings */
.section h2 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--text);
}

/* ─── Grid & Cards ────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,255,255,.08), rgba(255,0,255,.06));
  opacity: 0;
  transition: opacity var(--transition);
}

.card:hover {
  transform: translateY(-6px) scale(1.015);
  border-color: var(--cyan);
  box-shadow: 0 18px 36px rgba(0,255,255,.18);
}

.card:hover::before { opacity: 1; }
.card > * { position: relative; z-index: 1; }

/* ─── Badges ──────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  background: rgba(0,255,255,.18);
  color: var(--cyan);
  padding: 3px 11px;
  border-radius: 20px;
  font-size: .8rem;
  font-family: var(--font-mono);
  margin: 2px;
}

/* Priority borders */
.priority-high   { border-left: 3px solid #ff4444; }
.priority-medium { border-left: 3px solid #ffaa00; }
.priority-low    { border-left: 3px solid #44ff44; }

/* ─── Skill Bar ───────────────────────────────────────────────── */
.skill-bar {
  background: rgba(255,255,255,.1);
  height: 5px;
  border-radius: 3px;
  margin: 12px 0 6px;
  overflow: hidden;
}

.skill-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--blue));
  border-radius: 3px;
  position: relative;
  transition: width 1.4s ease;
}

.skill-progress::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: shimmer 2.2s infinite;
}

@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ─── Timeline ────────────────────────────────────────────────── */
.timeline {
  position: relative;
  padding-left: 28px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 10px; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, var(--cyan), var(--magenta), var(--blue));
}

.timeline-item {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(0,128,255,.2);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 18px;
  position: relative;
  transition: all var(--transition);
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -32px; top: 22px;
  width: 11px; height: 11px;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  border-radius: 50%;
  border: 2px solid var(--bg);
}

.timeline-item:hover {
  transform: scale(1.02);
  border-color: var(--blue);
  box-shadow: 0 12px 28px rgba(0,128,255,.2);
}

/* ─── Stats ───────────────────────────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px;
  margin-bottom: 28px;
}

.stat-card {
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}

.stat-card:hover {
  transform: translateY(-7px);
  border-color: var(--cyan);
  box-shadow: 0 18px 36px rgba(0,255,255,.18);
}

.stat-number {
  font-size: 2.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
  margin-bottom: 8px;
}

/* ─── Welcome ─────────────────────────────────────────────────── */
.welcome-card {
  text-align: center;
  padding: 72px 40px;
  background: linear-gradient(135deg, rgba(0,255,255,.08), rgba(255,0,255,.08));
  border-radius: var(--radius);
}

.welcome-card h2 {
  font-size: clamp(2.5rem, 6vw, 4.2rem);
  font-weight: 800;
  letter-spacing: -.03em;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
}

.welcome-card .subtitle {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--blue);
  margin-bottom: 28px;
  letter-spacing: .06em;
}

.welcome-card .quote {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.8;
}

/* ─── Project Cards ───────────────────────────────────────────── */
.project-card {
  cursor: pointer;
  position: relative;
}

.project-card::after {
  content: '🔍 Voir les détails';
  position: absolute;
  bottom: 14px; right: 16px;
  font-family: var(--font-mono);
  font-size: .75rem;
  color: var(--cyan);
  opacity: 0;
  transition: opacity var(--transition);
  background: rgba(0,0,0,.75);
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.project-card:hover::after { opacity: 1; }

.project-card:hover {
  border-color: var(--magenta);
  box-shadow: 0 18px 36px rgba(255,0,255,.22);
}

/* ─── Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal-overlay.show { display: flex; animation: fadeIn .25s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: rgba(8,12,24,.96);
  border: 1px solid rgba(0,255,255,.3);
  border-radius: 16px;
  padding: 40px;
  max-width: 820px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 30px 60px rgba(0,255,255,.15);
  animation: scaleIn .28s cubic-bezier(.4,0,.2,1);
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(.88) translateY(-16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: 1px solid var(--border);
  color: var(--cyan);
  font-size: 1.4rem;
  cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: all var(--transition);
}

.modal-close:hover {
  background: rgba(0,255,255,.1);
  transform: rotate(90deg);
}

.modal h2 {
  font-size: 1.7rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  padding-right: 40px;
}

.modal-status {
  display: inline-block;
  background: rgba(0,255,0,.15);
  color: #00ff88;
  padding: 5px 14px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: .82rem;
  font-weight: 700;
  margin-bottom: 18px;
}

.modal-techno { margin: 16px 0 20px; }

.modal-body h4 {
  color: var(--cyan);
  margin: 22px 0 12px;
  font-size: 1rem;
  font-weight: 700;
}

.modal-body h4:nth-of-type(2) { color: var(--magenta); }
.modal-body h4:nth-of-type(3) { color: var(--blue); }
.modal-body h4:nth-of-type(4) { color: #44ff88; }
.modal-body h4:nth-of-type(5) { color: #00ff88; }

.modal-body p {
  margin-bottom: 6px;
  color: var(--text);
  font-size: .95rem;
  line-height: 1.7;
}

/* ─── Tableau E5 ──────────────────────────────────────────────── */
.tableau-legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  font-family: var(--font-mono);
  font-size: .78rem;
  color: var(--muted);
}

.legend-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
}

.pdf-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,255,255,.08);
  color: var(--cyan);
  border: 1px solid rgba(0,255,255,.35);
  padding: 12px 24px;
  border-radius: 10px;
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: .88rem;
  transition: all var(--transition);
  margin-bottom: 22px;
}

.pdf-btn:hover {
  background: rgba(0,255,255,.16);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,255,255,.18);
}

.tableau-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }

.comp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 720px;
}

.comp-table thead tr { background: rgba(0,255,255,.04); }

.comp-table th {
  padding: 12px 8px;
  font-weight: 600;
  font-size: 11px;
  color: var(--cyan);
  text-align: center;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  line-height: 1.35;
  font-family: var(--font-mono);
}

.comp-table th.left { text-align: left; min-width: 210px; }

.comp-table td {
  padding: 10px 8px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  vertical-align: middle;
}

.comp-table tr:last-child td { border-bottom: none; }
.comp-table tbody tr:hover td { background: rgba(0,255,255,.03); }
.comp-table td.check { text-align: center; }
.check-yes { color: var(--cyan); font-size: 15px; }

.section-row td {
  background: rgba(255,255,255,.03);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: rgba(255,255,255,.35);
  padding: 6px 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.badge-pro    { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(29,158,117,.18); color: #1D9E75; font-weight: 600; margin-bottom: 3px; font-family: var(--font-mono); }
.badge-school { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(55,138,221,.18); color: #378ADD; font-weight: 600; margin-bottom: 3px; font-family: var(--font-mono); }
.badge-perso  { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(127,119,221,.18); color: #9f99e8; font-weight: 600; margin-bottom: 3px; font-family: var(--font-mono); }

.realisation-title { font-size: 12px; color: var(--text); font-weight: 600; }
.realisation-desc  { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.45; font-family: var(--font-mono); }

/* ─── Contact ─────────────────────────────────────────────────── */
.contact-highlight {
  text-align: center;
  padding: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 18px;
  background: rgba(0,128,255,.06);
}

/* ─── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,.3); border-radius: 3px; }

/* ─── Responsive ──────────────────────────────────────────────── */
@media (max-width: 768px) {
  .content { padding: 22px; }
  .grid, .stats { grid-template-columns: 1fr; }
  .modal { padding: 24px; }
  .modal h2 { font-size: 1.3rem; }
  .welcome-card { padding: 48px 22px; }
}
</style>
</head>

<div class="container">
  <header class="header">
    <h1>🖥️ Mohamed Korichi</h1>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Détails du projet">

</div>

let activeTab = 'accueil';

function show(id) {
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.getElementById('content').innerHTML = `<div class="section active">${sections[id]()}</div>`;
}

/* ─────────────────────────────────────────────────────────────

───────────────────────────────────────────────────────────── */
function openModal(idx) {
  const p = DATA.projets[idx];
  document.getElementById('modal-content').innerHTML = `
    <h2>${p.nom}</h2>
    <div class="modal-status">${p.statut}</div>
    <p style="font-family:var(--font-mono);font-size:.82rem;color:var(--muted);margin-bottom:12px">${p.type}</p>
    <div class="modal-techno"><strong>Technologies :</strong><br>${badges(p.techno)}</div>
    <div class="modal-body">${p.desc}</div>`;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

/* ─────────────────────────────────────────────────────────────
   EVENTS
───────────────────────────────────────────────────────────── */
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Keyboard support for tab buttons and project cards
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.matches('.tab-btn')) e.target.click();
  if (e.key === 'Enter' && e.target.matches('.project-card')) e.target.click();
  if (e.key === 'Enter' && e.target.matches('.stat-card')) e.target.click();
