        /* Styles pour le modal/popup */
        .modal-overlay {
            position: fixed;

        }

        .modal-overlay.show {

        }

        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: rgba(10, 14, 26, 0.95);

        }

        @keyframes slideInModal {
            from { 
                opacity: 0;
                transform: scale(0.8) translateY(-20px);
            }
            to { 
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

ches Cisco et bornes Wi-Fi industrielles</p><p>• Configuration de seuils d'alerte adaptés à l'environnement transport (latence, bande passante, disponibilité)</p><p>• Mise en place de tableaux de bord pour le monitoring temps réel de l'infrastructure réseau</p><p>• Formation de l'équipe aux nouveaux dashboards et procédures d'escalade des alertes</p></div><div style="margin-bottom:15px"><h4 style="color:#0080ff;margin-bottom:10px">💻 AUTOMATISATION ACTIVE DIRECTORY</h4><p><strong>Développement de scripts PowerShell avancés :</strong></p><p>• <strong>Script de nettoyage automatique :</strong> Suppression sécurisée des comptes utilisateurs désactivés depuis plus de 90 jours avec archivage préalable et validation hiérarchique</p><p>• <strong>Audit de sécurité AD :</strong> Génération de rapports détaillés sur les comptes à privilèges élevés, dernières connexions, mots de passe expirés</p><p>• <strong>Gestion des groupes :</strong> Identification et suppression des groupes orphelins, consolidation des adhésions en double</p><p>• <strong>Rapports automatisés :</strong> Scripts planifiés générant des tableaux de bord Excel pour le management avec statistiques d'utilisation</p><p><strong>Impact organisationnel :</strong></p><p>• Réduction de 80% du temps de maintenance manuelle de l'Active Directory</p><p>• Amélioration de la sécurité par nettoyage régulier des comptes obsolètes</p><p>• Standardisation des procédures d'audit et de reporting pour l'équipe IT</p></div><div style="margin-bottom:15px"><h4 style="color:#44ff44;margin-bottom:10px">🎫 Support utilisateur et ticketing</h4><p><strong>Gestion via Easy Vista :</strong></p><p>• Traitement de 35+ tickets de niveau 1 : problèmes de connectivité, configuration postes, réinitialisation mots de passe</p><p>• Support des conducteurs et agents d'exploitation sur les outils métier (validation titres de transport, communication radio)</p><p>• Documentation des procédures de résolution pour création d'une base de connaissances</p                     resume: "Mission de diagnostic et optimisation des postes informatiques du BAL avec création d'un outil de diagnostic à distance personnalisé.",
                    desc: `<div style="margin-bottom:15px"><h4 style="color:#00ffff;margin-bottom:10px">🎯 CONTEXTE DE LA MISSION</h4><p><strong>Problématique :</strong> Les agents du BAL (Bureau des Agents de Ligne – Métro) rencontraient des lenteurs importantes sur leurs postes de travail, impactant directement leur efficacité quotidienne et les opérations de transport en commun. Les symptômes incluaient des temps de démarrage excessifs, des applications qui se bloquaient et une lenteur générale du système.</p><p><strong>Enjeu métier :</strong> Les postes informatiques du BAL sont essentiels pour la gestion des équipes de conducteurs, la planification des services et la communication opérationnelle. Toute défaillance impacte directement la qualité du service de transport public.</p><p><strong>Organisation :</strong> Mission réalisée en binôme pour bénéficier d'un regard croisé et optimiser l'efficacité des interventions.</p></div><div style="margin-bottom:15px"><h4 style="color:#ff00ff;margin-bottom:10px">🔍 PHASE DE DIAGNOSTIC APPROFONDI</h4><p><strong>Analyse des symptômes rapportés :</strong></p><p>• Temps de démarrage des postes supérieur à 5 minutes</p><p>• Applications métier (logiciels de planification, communication) qui se bloquent régulièrement</p><p>• Lenteur extrême lors de l'ouverture de fichiers ou navigation</p><p>• Blocages fréquents nécessitant des redémarrages forcés</p><p><strong>Hypothèses de travail identifiées :</strong></p><p>• <strong>Saturation de l'espace disque :</strong> Accumulation de fichiers temporaires, logs applicatifs, données utilisateur non archivées</p><p>• <strong>Sessions utilisateurs multiples :</strong> Présence de profils d'anciens employés non supprimés, sessions fantômes actives</p><p>• <strong>Ressources système insuffisantes :</strong> RAM insuffisante, processeur surchargé par des applications en arrière-plan</p><p>• <strong>Démarrage système encombré :</strong> Trop d'applications configurées pour se lancer au démarrage</p><p>• <strong>Fragmentation disque :</strong> Disques durs non défragmentés depuis longtemps</p></div><div style="margin-bottom:15px"><h4 style="color:#0080ff;margin-bottom:10px">💻 CRÉATION D'UN OUTIL DE DIAGNOSTIC À DISTANCE</h4><p><strong>Développement du script PowerShell personnalisé :</strong></p><p>• <strong>Inventaire des sessions utilisateur :</strong> Récupération de la liste complète des profils utilisateurs présents sur chaque poste, identification des sessions actives et dormantes</p><p>• <strong>Analyse de l'espace disque :</strong> Calcul de l'espace libre/utilisé par partition, identification des dossiers les plus volumineux (temp, logs, profils utilisateurs)</p><p>• <strong>Monitoring des ressources système :</strong> Utilisation CPU, RAM, processus en cours d'exécution, services actifs</p><p>• <strong>Audit des applications au démarrage :</strong> Liste des programmes configurés pour se lancer automatiquement</p><p>• <strong>État des disques durs :</strong> Vérification de la fragmentation, erreurs disque, santé générale des supports de stockage</p><p><strong>Architecture technique du script :</strong></p><p>• Exécution à distance via PowerShell Remoting depuis mon poste administrateur</p><p>• Génération de rapports au format CSV pour analyse et suivi</p><p>• Interface en ligne de commande avec paramètres pour cibler des postes spécifiques</p><p>• Système de logs pour traçabilité des interventions</p><p><strong>Avantages opérationnels :</strong></p><p>• <strong>Gain de temps considérable :</strong> Diagnostic simultané de tous les postes sans déplacement physique</p><p>• <strong>Centralisation des données :</strong> Vue d'ensemble de l'état du parc informatique BAL</p><p>• <strong>Standardisation :</strong> Même diagnostic appliqué à tous les postes pour comparaison objective</p></div><div style="margin-bottom:15px"><h4 style="color:#44ff44;margin-bottom:10px">🔧 ACTIONS CORRECTIVES RÉALISÉES</h4><p><strong>Optimisation logicielle :</strong></p><p>• <strong>Nettoyage espace disque :</strong> Suppression des fichiers temporaires Windows, vidage des corbeilles, nettoyage des logs applicatifs (récupération de 15-30 Go par poste)</p><p>• <strong>Gestion des profils utilisateurs :</strong> Suppression sécurisée des profils d'anciens employés après archivage des données importantes</p><p>• <strong>Optimisation du démarrage :</strong> Désactivation des applications non essentielles au démarrage (logiciels de mise à jour automatique, outils tiers non critiques)</p><p>• <strong>Défragmentation système :</strong> Défragmentation complète des disques durs sur les postes les plus impactés</p><p>• <strong>Mise à jour système :</strong> Installation des mises à jour Windows en retard, drivers matériel obsolètes</p><p><strong>Interventions matérielles :</strong></p><p>• <strong>Upgrade mémoire RAM :</strong> Ajout de barrettes mémoire sur 6 postes insuffisamment équipés (passage de 4GB à 8GB minimum)</p><p>• <strong>Remplacement de postes :</strong> Identification et remplacement de 3 ordinateurs obsolètes (plus de 8 ans) par du matériel récent</p><p>• <strong>Nettoyage physique :</strong> Dépoussiérage des unités centrales pour améliorer la ventilation et prévenir la surchauffe</p><p><strong>Documentation et procédures :</strong></p><p>• Création d'un rapport détaillé des interventions pour chaque poste</p><p>• Rédaction de recommandations de maintenance préventive</p><p>• Formation sommaire des agents BAL aux bonnes pratiques (gestion de l'espace disque, fermeture des applications)</p></div><div><h4 style="color:#00ff00;margin-bottom:10px">✅ RÉSULTATS OBTENUS</h4><p><strong>Amélioration des performances :</strong></p><p>• <strong>Temps de démarrage :</strong> Réduction de 70% du temps de démarrage (de 5+ minutes à moins de 2 minutes)</p><p>• <strong>Réactivité système :</strong> Élimination des blocages fréquents, navigation fluide dans les applications métier</p><p>• <strong>Stabilité :</strong> Fin des redémarrages forcés quotidiens, système stable sur toute la journée de travail</p><p><strong>Impact opérationnel :</strong></p><p>• <strong>Productivité agents :</strong> Retour à un confort de travail normal pour les 15 agents du BAL</p><p>• <strong>Continuité de service :</strong> Élimination des interruptions de service liées aux problèmes informatiques</p><p>• <strong>Satisfaction utilisateurs :</strong> Retours très positifs des agents sur l'amélioration constatée</p><p><strong>Valeur ajoutée technique :</strong></p><p>• <strong>Innovation :</strong> Création d'un outil de diagnostic réutilisable pour d'autres sites RATP Dev</p><p>• <strong>Méthodologie :</strong> Développement d'une approche structurée de diagnostic et résolution</p><p>• <strong>Autonomie :</strong> Démonstration de capacité à innover face aux défis techniques rencontrés</p><p>• <strong>Documentation :</strong> Capitalisation des connaissances pour faciliter les interventions futures</p><p><strong>Reconnaissance professionnelle :</strong></p><p>Cette mission a été particulièrement appréciée par l'équipe IT et la direction, démontrant ma capacité à allier compétences techniques et sens de l'innovation pour résoudre efficacement des problématiques opérationnelles critiques.</p></div>`,

                {titre: "Certification AWS Cloud Practitioner", cat: "☁️ Cloud", priorite: "Moyenne", date: "2026-03-01", desc: "Découverte du cloud computing avec AWS et validation des connaissances fondamentales. Élargissement des compétences vers les infrastructures cloud."},
                {titre: "Spécialisation Cybersécurité", cat: "🔒 Sécurité", priorite: "Moyenne", date: "2026-06-01", desc: "Approfondissement des compétences en sécurité informatique : pare-feu, sécurisation des infrastructures, audit de sécurité réseau."}

        const sections = {
            accueil: () => `<div class="welcome-card"><h2>Mohamed Korichi</h2><div class="subtitle">Étudiant BTS SIO SISR</div><div class="quote">"Passionné par l'infrastructure et les réseaux, je transforme les défis techniques en solutions innovantes. Chaque système que je configure, chaque réseau que j'optimise, contribue à construire l'avenir numérique."</div></div>`,
            
            dashboard: () => `<h2>📊 Vue d'ensemble</h2><div class="stats">${['competences','projets','parcours','objectifs'].map((s,i)=>['9 Compétences','4 Projets','3 Étapes clés','3 Objectifs'][i]).map((txt,i)=>`<div class="stat-card clickable" onclick="show('${['competences','projets','parcours','objectifs'][i]}')"><div class="stat-number">${txt.split(' ')[0]}</div><div>${txt.split(' ').slice(1).join(' ')}</div></div>`).join('')}</div><p><strong>Progression :</strong> En cours de BTS SIO SISR - Spécialisation infrastructure, systèmes et réseaux</p><p><strong>Stage RATP Dev Lyon :</strong> 7 semaines - Configuration réseau, switches Cisco, VLAN, supervision Zabbix, automatisation PowerShell, gestion tickets Easy Vista, diagnostic et optimisation postes informatiques BAL</p><p><strong>Dernière mise à jour :</strong> ${new Date().toLocaleDateString('fr-FR')}</p>`,

        };

        function show(id) {
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelector(`[onclick="show('${id}')"]`).classList.add('active');
            document.getElementById('content').innerHTML = `<div class="section active">${sections[id]()}</div>`;
        }

        function openModal(projectIndex) {
            const projet = d.projets[projectIndex];
            const modalContent = `
                <h2>${projet.nom}</h2>
                <div class="modal-status">${projet.statut}</div>
                <p><strong>${projet.type}</strong></p>
                <div class="modal-techno">
                    <strong>Technologies utilisées :</strong><br>
                    ${projet.techno.map(t=>`<span class="badge">${t}</span>`).join('')}
                </div>
                <div>${projet.desc}</div>
            `;
            document.getElementById('modal-content').innerHTML = modalContent;
            document.getElementById('modal-overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // Fermer le modal en cliquant sur l'overlay
        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Fermer le modal avec Échap
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        document.getElementById('tabs').innerHTML = d.tabs.map(t=>`<button class="tab-btn${t.id==='accueil'?' active':''}" onclick="show('${t.id}')">${t.icon} ${t.name}</button>`).join('');
        show('accueil');
