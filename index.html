<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Korichi — Portfolio BTS SIO SISR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Tokens ─────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
:root {
  --cyan:   #00ffff;
  --magenta:#ff00ff;
  --blue:   #0080ff;
  --bg:     #080c18;
  --bg2:    #0d1120;
  --surface: rgba(255,255,255,0.04);
  --border:  rgba(0,255,255,0.18);
  --text:   #dde6f0;
  --muted:  rgba(255,255,255,0.45);
  --font-display: 'Syne', sans-serif;
  --font-mono:    'Space Mono', monospace;
  --radius: 12px;
  --transition: 0.28s cubic-bezier(.4,0,.2,1);
}
 
body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  overflow-x: hidden;
  min-height: 100vh;
}
 
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 90%, rgba(0,255,255,.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 10%, rgba(255,0,255,.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(0,128,255,.04) 0%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}
 
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  position: relative;
  z-index: 1;
}
 
.header {
  text-align: center;
  padding: 64px 0 48px;
  position: relative;
}
 
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 280px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
  animation: linePulse 3s ease-in-out infinite alternate;
}
 
@keyframes linePulse { from { opacity:.4; width:180px } to { opacity:1; width:320px } }
 
.header h1 {
  font-size: clamp(2.2rem, 5vw, 3.6rem);
  font-weight: 800;
  letter-spacing: -.02em;
  background: linear-gradient(135deg, var(--cyan) 0%, var(--magenta) 50%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}
 
.header p {
  font-family: var(--font-mono);
  font-size: .95rem;
  color: var(--muted);
  letter-spacing: .08em;
}
 
.tabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}
 
.tab-btn {
  font-family: var(--font-display);
  font-size: .85rem;
  font-weight: 600;
  letter-spacing: .02em;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
 
.tab-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,255,255,.12), rgba(255,0,255,.08));
  opacity: 0;
  transition: opacity var(--transition);
}
 
.tab-btn:hover,
.tab-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,255,255,.15);
}
 
.tab-btn:hover::after,
.tab-btn.active::after { opacity: 1; }
 
.content {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  padding: 36px;
  box-shadow: 0 24px 48px rgba(0,0,0,.35);
  position: relative;
  overflow: hidden;
}
 
.content::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
  opacity: .5;
}
 
.section { display: none; }
.section.active {
  display: block;
  animation: fadeUp .4s ease forwards;
}
 
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
 
.section h2 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--text);
}
 
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
  margin-top: 20px;
}
 
.card {
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
 
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,255,255,.08), rgba(255,0,255,.06));
  opacity: 0;
  transition: opacity var(--transition);
}
 
.card:hover {
  transform: translateY(-6px) scale(1.015);
  border-color: var(--cyan);
  box-shadow: 0 18px 36px rgba(0,255,255,.18);
}
 
.card:hover::before { opacity: 1; }
.card > * { position: relative; z-index: 1; }
 
.badge {
  display: inline-block;
  background: rgba(0,255,255,.18);
  color: var(--cyan);
  padding: 3px 11px;
  border-radius: 20px;
  font-size: .8rem;
  font-family: var(--font-mono);
  margin: 2px;
}
 
.priority-high   { border-left: 3px solid #ff4444; }
.priority-medium { border-left: 3px solid #ffaa00; }
.priority-low    { border-left: 3px solid #44ff44; }
 
.skill-bar {
  background: rgba(255,255,255,.1);
  height: 5px;
  border-radius: 3px;
  margin: 12px 0 6px;
  overflow: hidden;
}
 
.skill-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--blue));
  border-radius: 3px;
  position: relative;
  transition: width 1.4s ease;
}
 
.skill-progress::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: shimmer 2.2s infinite;
}
 
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
 
.timeline {
  position: relative;
  padding-left: 28px;
}
 
.timeline::before {
  content: '';
  position: absolute;
  left: 10px; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, var(--cyan), var(--magenta), var(--blue));
}
 
.timeline-item {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(0,128,255,.2);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 18px;
  position: relative;
  transition: all var(--transition);
}
 
.timeline-item::before {
  content: '';
  position: absolute;
  left: -32px; top: 22px;
  width: 11px; height: 11px;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  border-radius: 50%;
  border: 2px solid var(--bg);
}
 
.timeline-item:hover {
  transform: scale(1.02);
  border-color: var(--blue);
  box-shadow: 0 12px 28px rgba(0,128,255,.2);
}
 
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px;
  margin-bottom: 28px;
}
 
.stat-card {
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}
 
.stat-card:hover {
  transform: translateY(-7px);
  border-color: var(--cyan);
  box-shadow: 0 18px 36px rgba(0,255,255,.18);
}
 
.stat-number {
  font-size: 2.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
  margin-bottom: 8px;
}
 
.welcome-card {
  text-align: center;
  padding: 72px 40px;
  background: linear-gradient(135deg, rgba(0,255,255,.08), rgba(255,0,255,.08));
  border-radius: var(--radius);
}
 
.welcome-card h2 {
  font-size: clamp(2.5rem, 6vw, 4.2rem);
  font-weight: 800;
  letter-spacing: -.03em;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
}
 
.welcome-card .subtitle {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--blue);
  margin-bottom: 28px;
  letter-spacing: .06em;
}
 
.welcome-card .quote {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.8;
}
 
.project-card {
  cursor: pointer;
  position: relative;
}
 
.project-card::after {
  content: '🔍 Voir les détails';
  position: absolute;
  bottom: 14px; right: 16px;
  font-family: var(--font-mono);
  font-size: .75rem;
  color: var(--cyan);
  opacity: 0;
  transition: opacity var(--transition);
  background: rgba(0,0,0,.75);
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
 
.project-card:hover::after { opacity: 1; }
 
.project-card:hover {
  border-color: var(--magenta);
  box-shadow: 0 18px 36px rgba(255,0,255,.22);
}
 
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
 
.modal-overlay.show { display: flex; animation: fadeIn .25s ease; }
 
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
 
.modal {
  background: rgba(8,12,24,.96);
  border: 1px solid rgba(0,255,255,.3);
  border-radius: 16px;
  padding: 40px;
  max-width: 820px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 30px 60px rgba(0,255,255,.15);
  animation: scaleIn .28s cubic-bezier(.4,0,.2,1);
}
 
@keyframes scaleIn {
  from { opacity: 0; transform: scale(.88) translateY(-16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
 
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: 1px solid var(--border);
  color: var(--cyan);
  font-size: 1.4rem;
  cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: all var(--transition);
}
 
.modal-close:hover {
  background: rgba(0,255,255,.1);
  transform: rotate(90deg);
}
 
.modal h2 {
  font-size: 1.7rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  padding-right: 40px;
}
 
.modal-status {
  display: inline-block;
  background: rgba(0,255,0,.15);
  color: #00ff88;
  padding: 5px 14px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: .82rem;
  font-weight: 700;
  margin-bottom: 18px;
}
 
.modal-techno { margin: 16px 0 20px; }
 
.modal-body h4 {
  color: var(--cyan);
  margin: 22px 0 12px;
  font-size: 1rem;
  font-weight: 700;
}
 
.modal-body h4:nth-of-type(2) { color: var(--magenta); }
.modal-body h4:nth-of-type(3) { color: var(--blue); }
.modal-body h4:nth-of-type(4) { color: #44ff88; }
.modal-body h4:nth-of-type(5) { color: #00ff88; }
 
.modal-body p {
  margin-bottom: 6px;
  color: var(--text);
  font-size: .95rem;
  line-height: 1.7;
}
 
.tableau-legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  font-family: var(--font-mono);
  font-size: .78rem;
  color: var(--muted);
}
 
.legend-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
}
 
.pdf-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,255,255,.08);
  color: var(--cyan);
  border: 1px solid rgba(0,255,255,.35);
  padding: 12px 24px;
  border-radius: 10px;
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: .88rem;
  transition: all var(--transition);
  margin-bottom: 22px;
}
 
.pdf-btn:hover {
  background: rgba(0,255,255,.16);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,255,255,.18);
}
 
.tableau-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
 
.comp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 720px;
}
 
.comp-table thead tr { background: rgba(0,255,255,.04); }
 
.comp-table th {
  padding: 12px 8px;
  font-weight: 600;
  font-size: 11px;
  color: var(--cyan);
  text-align: center;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  line-height: 1.35;
  font-family: var(--font-mono);
}
 
.comp-table th.left { text-align: left; min-width: 210px; }
 
.comp-table td {
  padding: 10px 8px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  vertical-align: middle;
}
 
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tbody tr:hover td { background: rgba(0,255,255,.03); }
.comp-table td.check { text-align: center; }
.check-yes { color: var(--cyan); font-size: 15px; }
 
.section-row td {
  background: rgba(255,255,255,.03);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: rgba(255,255,255,.35);
  padding: 6px 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
}
 
.badge-pro    { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(29,158,117,.18); color: #1D9E75; font-weight: 600; margin-bottom: 3px; font-family: var(--font-mono); }
.badge-school { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(55,138,221,.18); color: #378ADD; font-weight: 600; margin-bottom: 3px; font-family: var(--font-mono); }
.badge-perso  { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(127,119,221,.18); color: #9f99e8; font-weight: 600; margin-bottom: 3px; font-family: var(--font-mono); }
 
.realisation-title { font-size: 12px; color: var(--text); font-weight: 600; }
.realisation-desc  { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.45; font-family: var(--font-mono); }
 
.contact-highlight {
  text-align: center;
  padding: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 18px;
  background: rgba(0,128,255,.06);
}

/* ─── Veille Technologique ─────────────────────────────────── */
.veille-hero {
  position: relative;
  background: linear-gradient(135deg, rgba(0,255,255,.06), rgba(255,0,255,.06), rgba(0,128,255,.08));
  border: 1px solid rgba(0,255,255,.2);
  border-radius: 16px;
  padding: 36px;
  margin-bottom: 32px;
  overflow: hidden;
}

.veille-hero::before {
  content: '🧠';
  position: absolute;
  right: 30px; top: 50%;
  transform: translateY(-50%);
  font-size: 7rem;
  opacity: .07;
  pointer-events: none;
}

.veille-hero h3 {
  font-size: 1.35rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.veille-hero .meta {
  font-family: var(--font-mono);
  font-size: .78rem;
  color: var(--muted);
  margin-bottom: 16px;
  letter-spacing: .06em;
}

.veille-hero p {
  font-size: .97rem;
  color: var(--text);
  line-height: 1.8;
  max-width: 720px;
}

.veille-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.veille-stat {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 16px;
  text-align: center;
}

.veille-stat .num {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
  line-height: 1;
  margin-bottom: 6px;
}

.veille-stat .lbl {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--muted);
  line-height: 1.3;
}

.veille-section-title {
  font-family: var(--font-mono);
  font-size: .75rem;
  color: var(--cyan);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin: 32px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0,255,255,.15);
}

.veille-steps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.veille-step {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  padding: 20px;
  transition: all var(--transition);
}

.veille-step:hover {
  border-color: var(--cyan);
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,255,255,.12);
}

.veille-step .step-num {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--cyan);
  margin-bottom: 8px;
  opacity: .6;
}

.veille-step h4 {
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.veille-step p {
  font-size: .85rem;
  color: var(--muted);
  line-height: 1.6;
}

.veille-img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.veille-img-card {
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.03);
  transition: all var(--transition);
}

.veille-img-card:hover {
  border-color: var(--cyan);
  transform: translateY(-4px);
  box-shadow: 0 14px 32px rgba(0,255,255,.15);
}

.veille-img-card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  display: block;
}

.veille-img-card .img-caption {
  padding: 12px 14px;
  font-family: var(--font-mono);
  font-size: .74rem;
  color: var(--muted);
  line-height: 1.4;
}

.veille-articles {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}

.article-card {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  padding: 18px 20px;
  text-decoration: none;
  transition: all var(--transition);
}

.article-card:hover {
  border-color: var(--cyan);
  transform: translateX(6px);
  box-shadow: 0 8px 24px rgba(0,255,255,.12);
}

.article-num {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: rgba(0,255,255,.25);
  min-width: 32px;
  line-height: 1;
  margin-top: 2px;
}

.article-body {}

.article-source {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--cyan);
  margin-bottom: 5px;
  letter-spacing: .05em;
}

.article-title {
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 5px;
  line-height: 1.4;
}

.article-desc {
  font-size: .84rem;
  color: var(--muted);
  line-height: 1.55;
}

.article-date {
  font-family: var(--font-mono);
  font-size: .7rem;
  color: var(--muted);
  margin-top: 6px;
  opacity: .6;
}

.veille-limits {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.limit-card {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 18px;
}

.limit-card .limit-icon {
  font-size: 1.6rem;
  margin-bottom: 10px;
  display: block;
}

.limit-card h4 {
  font-size: .9rem;
  font-weight: 700;
  color: var(--text);

let activeTab = 'accueil';
 
function show(id) {
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.getElementById('content').innerHTML = `<div class="section active">${sections[id]()}</div>`;
}
 
function openModal(idx) {
  const p = DATA.projets[idx];
  document.getElementById('modal-content').innerHTML = `
    <h2>${p.nom}</h2>
    <div class="modal-status">${p.statut}</div>
    <p style="font-family:var(--font-mono);font-size:.82rem;color:var(--muted);margin-bottom:12px">${p.type}</p>
    <div class="modal-techno"><strong>Technologies :</strong><br>${badges(p.techno)}</div>
    <div class="modal-body">${p.desc}</div>`;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
 
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}
 
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
 
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.target.matches('.tab-btn')) e.target.click();
  if (e.key === 'Enter' && e.target.matches('.project-card')) e.target.click();
  if (e.key === 'Enter' && e.target.matches('.stat-card')) e.target.click();
});
 
document.getElementById('tabs').innerHTML = DATA.tabs.map(t =>
  `<button class="tab-btn${t.id === 'accueil' ? ' active' : ''}" data-tab="${t.id}" onclick="show('${t.id}')">${t.icon} ${t.name}</button>`
).join('');
